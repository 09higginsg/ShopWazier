<!-- HTML document type -->
<!DOCTYPE html>

<!-- Start html -->
<html lang="en">

<!-- Head section -->
<head>

  <!-- Character settings -->
  <meta charset="UTF-8">

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Page title -->
  <title>ShopWazier</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS file -->
  <link rel="stylesheet" href="style.css">

<!-- End head -->
</head>

<!-- Body section -->
<body class="bg-light">

  <!-- Main app wrapper -->
  <main class="app-wrap d-flex justify-content-center py-4">

    <!-- Phone container -->
    <div class="phone bg-white mx-auto">

      <!-- App title -->
      <div class="text-center fw-bold mb-3 w-100" style="color:#4a86c5; font-size:26px;">
        SHOPWAZIER
      </div>

      <!-- Store buttons row -->
      <div class="d-flex justify-content-center gap-2 mb-4">

        <!-- Dunnes button -->
        <button id="store-dunnes" class="btn store border border-2 border-dark dunnes">DUNNES</button>

        <!-- Tesco button -->
        <button id="store-tesco" class="btn store border border-2 border-dark tesco">TESCO</button>

        <!-- Lidl button -->
        <button id="store-lidl" class="btn store border border-2 border-dark lidl">LIDL</button>

        <!-- Aldi button -->
        <button id="store-aldi" class="btn store border border-2 border-dark aldi">ALDI</button>

      </div>

      <!-- Action buttons row -->
      <div class="d-flex justify-content-center mb-3">

        <!-- Scan button -->
        <button id="scanBtn" class="btn action border border-2 border-dark text-white px-5 py-3 fs-6 w-100">
          SCAN ITEM
        </button>

      </div>

      <!-- Status text -->
      <div id="statusMessage" class="text-center fw-bold mb-3">Select a store</div>

      <!-- ✅ Price confirmation UI -->
      <div id="priceConfirm" class="text-center mb-3" style="display:none;">
        <div id="priceText" class="fw-bold mb-2"></div>

        <button id="confirmYes" class="btn btn-success me-2">✔️</button>
        <button id="confirmNo" class="btn btn-danger">❌</button>
      </div>

      <!-- Divider line -->
      <hr class="border-2 border-dark mx-2">

      <!-- Shopping list title -->
      <div class="list-title mx-auto text-center fw-bold mb-3">
        SHOPPING LIST
      </div>

      <!-- List box container -->
      <div class="list-box mx-auto">

        <!-- Empty label -->
        <div id="emptyLabel" class="text-center fw-bold mb-2">EMPTY</div>

        <!-- Shopping items -->
        <div id="cartItems" class="mb-3 cart-items"></div>

        <!-- Total display -->
        <div id="cartTotal" class="total text-center fw-bold">
          TOTAL: €0.00
        </div>

      </div>

    </div>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App JS -->
  <script src="app.js"></script>

<!-- End body -->
</body>

<!-- End html -->
</html>
